name: FlowCut CI Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================
  # Job 1: Rust Backend Tests
  # ============================================
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev

      - name: Check Rust code formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Clippy lint checks
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build Rust backend (debug)
        run: cargo build --manifest-path src-tauri/Cargo.toml --verbose

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --verbose

  # ============================================
  # Job 2: Frontend Lint
  # ============================================
  lint-frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          # Basic validation - check that index.html exists and has required elements
          if [ ! -f "src/index.html" ]; then echo "Error: index.html not found"; exit 1; fi
          echo "HTML structure validated successfully"

      - name: Check CSS files
        run: |
          # Verify all CSS files exist
          for css in main toolbar timeline preview media-browser properties components; do
            if [ ! -f "src/styles/${css}.css" ]; then echo "Error: ${css}.css not found"; exit 1; fi
          done
          echo "All CSS files validated"

      - name: Check JavaScript files
        run: |
          # Verify all JS files exist
          for js in core/events core/ipc core/app timeline/track timeline/clip timeline/timeline preview/preview media/browser ui/properties ui/menus ui/dialogs; do
            if [ ! -f "src/scripts/${js}.js" ]; then echo "Error: ${js}.js not found"; exit 1; fi
          done
          echo "All JavaScript files validated"

  # ============================================
  # Job 3: Build Linux App
  # ============================================
  build-linux:
    name: Build Linux (x64)
    needs: [test-rust, lint-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            file

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli@latest

      - name: Build FlowCut (Linux)
        run: npm run build
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: List build artifacts
        run: |
          echo "=== Build Artifacts ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle files found"
          find src-tauri/target/release -maxdepth 1 -name "flowcut*" -type f 2>/dev/null || echo "No binary found"

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-linux-x64-binary
          path: src-tauri/target/release/flowcut
          if-no-files-found: warn

      - name: Upload Linux deb package
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-linux-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-linux-x64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ============================================
  # Job 4: Build Windows App
  # ============================================
  build-windows:
    name: Build Windows (x64)
    needs: [test-rust, lint-frontend]
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli@latest

      - name: Build FlowCut (Windows)
        run: npm run build
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-windows-x64-exe
          path: src-tauri/target/release/flowcut.exe
          if-no-files-found: warn

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-windows-x64-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ============================================
  # Job 5: Build macOS App
  # ============================================
  build-macos:
    name: Build macOS (x64 + ARM)
    needs: [test-rust, lint-frontend]
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli@latest

      - name: Build FlowCut (macOS)
        run: npm run build
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-macos-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: flowcut-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
