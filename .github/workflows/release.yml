name: FlowCut Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: FlowCut v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## FlowCut v${{ steps.version.outputs.version }}

            ### What's New
            - Professional lightweight video editor
            - Timeline-based non-linear editing
            - Multi-track video and audio editing
            - Real-time preview playback
            - Built-in effects and color correction
            - Export to MP4, MKV, MOV, WebM, and more

            ### System Requirements
            - **Linux**: Ubuntu 20.04+ or equivalent, GTK3, WebKit2GTK
            - **Windows**: Windows 10+ (x64)
            - **macOS**: macOS 10.15+ (Catalina or later)

            ### Installation
            - **Linux**: Download the `.deb` or `.AppImage` file
            - **Windows**: Download the `.exe` installer
            - **macOS**: Download the `.dmg` file

  # ============================================
  # Build & Release - Linux
  # ============================================
  release-linux:
    name: Release Linux (x64)
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build FlowCut
        run: npm run build

      - name: Upload deb package to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: src-tauri/target/release/bundle/deb/flowcut_${{ needs.create-release.outputs.release_version }}_amd64.deb
          asset_name: flowcut_${{ needs.create-release.outputs.release_version }}_amd64.deb
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload AppImage to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: src-tauri/target/release/bundle/appimage/flowcut_${{ needs.create-release.outputs.release_version }}_amd64.AppImage
          asset_name: flowcut_${{ needs.create-release.outputs.release_version }}_amd64.AppImage
          asset_content_type: application/octet-stream

  # ============================================
  # Build & Release - Windows
  # ============================================
  release-windows:
    name: Release Windows (x64)
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Build FlowCut
        run: npm run build

      - name: Upload NSIS installer to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: src-tauri/target/release/bundle/nsis/FlowCut_${{ needs.create-release.outputs.release_version }}_x64-setup.exe
          asset_name: FlowCut_${{ needs.create-release.outputs.release_version }}_x64-setup.exe
          asset_content_type: application/octet-stream

  # ============================================
  # Build & Release - macOS
  # ============================================
  release-macos:
    name: Release macOS
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Build FlowCut
        run: npm run build

      - name: Upload DMG to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: src-tauri/target/release/bundle/dmg/FlowCut_${{ needs.create-release.outputs.release_version }}_x64.dmg
          asset_name: FlowCut_${{ needs.create-release.outputs.release_version }}_x64.dmg
          asset_content_type: application/octet-stream
